{# templates/partials/relatorios/notas_entradas.html #}
<div class="container-fluid pt-3 pb-4" data-page="notas-entradas">
  <div class="card shadow-sm">
      <div class="card-header bg-light">
          <h2 class="h4 mb-0 text-primary"><i class="bi bi-journal-text me-2"></i>Notas de Entrada</h2>
      </div>
    <div class="card-body">
      <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div class="page-toolbar-spacer"></div>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <button id="btn-excluir-selecionados" class="btn btn-danger page-toolbar-btn" type="button">
            Excluir selecionados
          </button>
        </div>
      </div>

      <form id="filtro-notas" class="row g-3 mb-4">
        <div class="col-xl-3 col-md-6">
          <label class="form-label">Fornecedor</label>
          <input type="text" name="fornecedor" class="form-control" placeholder="Fornecedor">
        </div>
        <div class="col-xl-2 col-md-6">
          <label class="form-label">Emiss&atilde;o De</label>
          <input type="date" name="emissao_de" class="form-control">
        </div>
        <div class="col-xl-2 col-md-6">
          <label class="form-label">Emiss&atilde;o At&eacute;</label>
          <input type="date" name="emissao_ate" class="form-control">
        </div>
        <div class="col-xl-2 col-md-6">
          <label class="form-label">Entrada De</label>
          <input type="date" name="entrada_de" class="form-control">
        </div>
        <div class="col-xl-2 col-md-6">
          <label class="form-label">Entrada At&eacute;</label>
          <input type="date" name="entrada_ate" class="form-control">
        </div>
        <div class="col-xl-3 col-md-6">
          <label class="form-label">Produto</label>
          <input type="text" name="produto" class="form-control" placeholder="Produto">
        </div>
        <div class="col-xl-2 col-md-6 align-self-end">
          <button type="submit" class="btn btn-primary w-100">Filtrar</button>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle" id="notas-entradas-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="check-todos"></th>
              <th>N&uacute;mero</th>
              <th>Fornecedor</th>
              <th>Emiss&atilde;o</th>
              <th>Entrada</th>
              <th>Valor Total</th>
              <th>A&ccedil;&otilde;es</th>
            </tr>
          </thead>
          <tbody>
            {# fica vazio; o JS preenche aqui #}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
