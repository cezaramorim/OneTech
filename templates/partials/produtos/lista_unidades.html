{% load static %}

<div class="container-fluid pt-3 pb-4" data-page="lista_unidades_produtos" data-list-controller="unified-list" data-list-url="{% url 'produto:lista_unidades' %}" data-search-param="busca">
  <div class="card shadow-sm">
    <div class="card-header bg-light">
      <h2 class="h4 mb-0 text-primary"><i class="bi bi-rulers me-2"></i>Unidades de Medida</h2>
    </div>
    <div class="card-body">
      <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div class="page-toolbar-form d-flex align-items-center gap-2 mb-0">
          <input type="text" id="search-input" class="form-control page-toolbar-search" placeholder="Buscar por sigla ou descricao..." value="{{ termo_busca|default_if_none:'' }}" autocomplete="off">
          <button type="button" id="btn-limpar-busca" class="btn btn-outline-secondary page-toolbar-btn">Limpar</button>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <a href="{% url 'produto:cadastrar_unidade' %}" class="btn btn-primary ajax-link">
            <i class="bi bi-plus-lg"></i> Nova Unidade
          </a>
          <button id="btn-editar-selecionado" type="button" class="btn btn-outline-primary btn-sm" disabled data-edit-url-base="{% url 'produto:editar_unidade' 0 %}">Editar</button>
          <button type="button" id="btn-excluir-selecionados" class="btn btn-outline-danger btn-sm" disabled data-delete-url="{% url 'produto:excluir_unidades' %}" data-entity-label-singular="unidade" data-entity-label-plural="unidades">Excluir</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th style="width: 40px;"><input type="checkbox" id="select-all-checkbox"></th>
              <th>Sigla</th>
              <th>Descricao</th>
            </tr>
          </thead>
          <tbody>
            {% for unidade in unidades %}
              <tr>
                <td><input type="checkbox" class="row-checkbox" value="{{ unidade.id }}"></td>
                <td>{{ unidade.sigla }}</td>
                <td>{{ unidade.descricao }}</td>
              </tr>
            {% empty %}
              <tr>
                <td colspan="3" class="text-center">
                  {% if termo_busca %}
                    Nenhuma unidade encontrada para a busca informada.
                  {% else %}
                    Nenhuma unidade cadastrada.
                  {% endif %}
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
