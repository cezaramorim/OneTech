{% load static %}

<div class="container-fluid pt-3 pb-4">
  <div id="identificador-tela"
       data-tela="lista_unidades"
       data-entidade-singular="unidade"
       data-entidade-plural="unidades"
       data-url-editar="{% url 'produto:editar_unidade' 0 %}"
       data-url-excluir="{% url 'produto:excluir_unidades' %}"
       data-seletor-checkbox=".check-unidade"
       data-seletor-pai="#select-all-unidades">

    <header class="page-header d-flex flex-wrap align-items-start justify-content-between mb-4">
      <div>
        <h4 class="fw-semibold mb-2"><i class="bi bi-rulers me-2"></i>Unidades de Medida</h4>
        <hr class="mt-0">
      </div>
    </header>

    {% if unidades %}
      <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div class="page-toolbar-spacer"></div>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <a href="{% url 'produto:cadastrar_unidade' %}" class="btn btn-primary ajax-link">
            <i class="bi bi-plus-lg"></i> Nova Unidade
          </a>
          <a id="btn-editar" class="btn btn-outline-primary btn-sm disabled" role="button">Editar</a>
          <button type="button" id="btn-excluir" class="btn btn-outline-danger btn-sm" disabled>Excluir</button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th style="width: 40px;"><input type="checkbox" id="select-all-unidades"></th>
              <th>Sigla</th>
              <th>Descri&ccedil;&atilde;o</th>
            </tr>
          </thead>
          <tbody>
            {% for unidade in unidades %}
              <tr>
                <td><input type="checkbox" class="check-unidade" value="{{ unidade.id }}"></td>
                <td>{{ unidade.sigla }}</td>
                <td>{{ unidade.descricao }}</td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    {% else %}
      <div class="alert alert-warning">Nenhuma unidade cadastrada ainda.</div>
    {% endif %}
  </div>
</div>
