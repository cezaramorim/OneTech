{% load static %}
{% load static widget_tweaks %}

<div class="container-fluid pt-3 pb-4">
  <div id="identificador-tela"
       data-tela="lista_categorias"
       data-entidade-singular="categoria"
       data-entidade-plural="categorias"
       data-url-editar="{% url 'produto:editar_categoria' 0 %}"
       data-url-excluir="{% url 'produto:excluir_categorias' %}"
       data-seletor-checkbox=".check-categoria"
       data-seletor-pai="#select-all-categorias">
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-light">
      <h2 class="h4 mb-0 text-primary"><i class="bi bi-folder me-2"></i>Categorias de Produto</h2>
    </div>
    <div class="card-body">

      {% if categorias %}
        <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
          <div class="page-toolbar-spacer"></div>
          <div class="d-flex flex-wrap align-items-center gap-2">
            <a href="{% url 'produto:cadastrar_categoria' %}" class="btn btn-primary ajax-link">
              <i class="bi bi-plus-lg"></i> Nova Categoria
            </a>
            <a id="btn-editar" class="btn btn-outline-primary btn-sm disabled" role="button">Editar</a>
            <button type="button" id="btn-excluir" class="btn btn-outline-danger btn-sm" disabled>Excluir</button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover table-bordered align-middle">
            <thead class="table-light">
              <tr>
                <th><input type="checkbox" id="select-all-categorias"></th>
                <th>Nome</th>
                <th>Descri&ccedil;&atilde;o</th>
              </tr>
            </thead>
            <tbody>
              {% for categoria in categorias %}
                <tr>
                  <td><input type="checkbox" class="check-categoria" value="{{ categoria.id }}"></td>
                  <td>{{ categoria.nome }}</td>
                  <td>{{ categoria.descricao }}</td>
                </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      {% else %}
        <div class="alert alert-warning">Nenhuma categoria cadastrada ainda.</div>
      {% endif %}
    </div>
  </div>
</div>
