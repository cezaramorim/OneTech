{% load static widget_tweaks %}

<!-- ✅ Cadastro de Unidade de Medida - AJAX | Responsivo, claro/escuro, boas práticas -->
<div class="container-fluid pt-3 pb-4" data-page="cadastrar-unidade">
  <header class="page-header d-flex flex-wrap align-items-start justify-content-between mb-4">
    <div>
      <h4 class="fw-semibold mb-2"><i class="bi bi-plus-circle me-2"></i>Cadastrar Unidade de Medida</h4>
      <hr class="mt-0">
    </div>
  </header>
  <form method="post" class="ajax-form" data-url="{% url 'produto:cadastrar_unidade' %}" data-response-type="json" autocomplete="off">
    {% csrf_token %}

    <div class="row g-3">
      <div class="col-md-4">{{ form.sigla.label_tag }} {{ form.sigla|add_class:"form-control" }}</div>
      <div class="col-md-8">{{ form.descricao.label_tag }} {{ form.descricao|add_class:"form-control" }}</div>
    </div>

    <div class="mt-4">
      <button type="submit" class="btn btn-success">Salvar</button>
      <a href="{% url 'produto:lista_unidades' %}" class="btn btn-secondary ajax-link ms-2">Cancelar</a>
    </div>
  </form>
</div>
