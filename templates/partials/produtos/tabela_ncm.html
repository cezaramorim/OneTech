<div class="ncm-table-scroll">
  <div class="table-responsive mb-0">
    <table class="table table-hover table-sm align-middle table-bordered mb-0 ncm-table">
      <thead class="table-light">
        <tr>
          <th style="width: 150px">Codigo</th>
          <th style="width: 180px">Nivel</th>
          <th>Descricao</th>
          <th style="width: 150px" class="text-center">Produtos vinculados</th>
        </tr>
      </thead>
      <tbody>
        {% for item in ncm_lista %}
          <tr>
            <td><code>{{ item.codigo_formatado }}</code></td>
            <td><span class="ncm-level-text">{{ item.nivel }}</span></td>
            <td>{{ item.descricao|safe }}</td>
            <td class="text-center">{{ item.produtos_vinculados|default:0 }}</td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="text-center text-muted">Nenhum codigo NCM encontrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
