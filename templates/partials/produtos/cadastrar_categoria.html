{% load static %}
{% load static widget_tweaks %}

<!-- ✅ Cadastro de Categoria de Produto - AJAX | Estrutura com main, card e mensagens -->
<div data-tela="cadastrar_categoria" class="container-fluid pt-3 pb-4">
  

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm rounded-4">
        <div class="card-header bg-light">
          <h2 class="h4 mb-0 text-primary">📁 Cadastrar Categoria</h2>
        </div>
        <div class="card-body">
          <form method="post" class="ajax-form" data-url="{% url 'produto:cadastrar_categoria' %}" data-response-type="json" autocomplete="off">
            {% csrf_token %}

            <div class="row g-3">
              <div class="col-md-6">
                {{ form.nome.label_tag }} {{ form.nome|add_class:"form-control" }}
              </div>
              <div class="col-md-6">
                {{ form.descricao.label_tag }} {{ form.descricao|add_class:"form-control" }}
              </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
              <a href="{% url 'produto:lista_categorias' %}" class="btn btn-secondary ajax-link">
                ← Cancelar
              </a>
              <button type="submit" class="btn btn-success">💾 Salvar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
