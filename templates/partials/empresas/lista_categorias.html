<div class="container-fluid pt-3 pb-4" data-page="lista_categorias" data-list-controller="unified-list" data-list-url="{% url 'empresas:lista_categorias' %}" data-search-param="busca">
  <div class="card shadow-sm">
    <div class="card-header bg-light">
      <h2 class="h4 mb-0 text-primary"><i class="bi bi-tags me-2"></i>Categorias de Empresas</h2>
    </div>
    <div class="card-body">

      <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div class="page-toolbar-form d-flex align-items-center gap-2 mb-0">
          <input type="text" id="search-input" class="form-control page-toolbar-search" placeholder="Buscar por nome da categoria..." value="{{ termo_busca|default_if_none:'' }}" autocomplete="off">
          <button type="button" id="btn-limpar-busca" class="btn btn-outline-secondary page-toolbar-btn">Limpar</button>
        </div>

        <div class="d-flex flex-wrap align-items-center gap-2">
          <a href="{% url 'empresas:cadastrar_categoria' %}" class="btn btn-success ajax-link">
            <i class="bi bi-plus-circle"></i> Nova
          </a>
          <button id="btn-editar-selecionado" type="button" class="btn btn-primary" disabled data-edit-url-base="{% url 'empresas:editar_categoria' 0 %}">
            <i class="bi bi-pencil"></i> Editar
          </button>
          <button id="btn-excluir-selecionados" type="button" class="btn btn-danger" disabled data-delete-url="{% url 'empresas:excluir_categorias_multiplos' %}" data-entity-label-singular="categoria" data-entity-label-plural="categorias">
            <i class="bi bi-trash"></i> Excluir
          </button>
        </div>
      </div>

      <div id="categorias-tabela-wrapper">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th style="width: 50px;"><input type="checkbox" id="select-all-checkbox"></th>
              <th>Nome</th>
            </tr>
          </thead>
          <tbody>
            {% for categoria in categorias %}
            <tr>
              <td><input type="checkbox" class="row-checkbox" value="{{ categoria.pk }}"></td>
              <td>{{ categoria.nome }}</td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="2" class="text-center">Nenhuma categoria encontrada.</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
