{% load static %}

<div class="container-fluid pt-3 pb-4" data-page="lista_empresas" data-list-controller="unified-list" data-list-url="{% url 'empresas:lista_empresas' %}" data-search-param="termo_empresa" data-filter-form="#filtro-empresas">
  

  <div class="card shadow-sm mx-auto" style="max-width: 1100px;">
    <div class="card-header bg-light">
      <h2 class="h4 mb-0 text-primary"><i class="bi bi-buildings me-2"></i>Empresas</h2>
    </div>
    <div class="card-body">

      <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <form id="filtro-empresas"
              class="page-toolbar-form d-flex align-items-center gap-2 mb-0"
              method="get"
              action="{% url 'empresas:lista_empresas' %}">
          <input type="text"
                 id="search-input"
                 name="termo_empresa"
                 class="form-control page-toolbar-search"
                 placeholder="Buscar por raz&atilde;o social, nome ou documento"
                 value="{{ request.GET.termo_empresa|default_if_none:'' }}"
                 autocomplete="off">
          <select name="tipo" class="form-select" style="width: 180px;">
            <option value="">Tipo de Empresa</option>
            <option value="PJ" {% if request.GET.tipo == 'PJ' %}selected{% endif %}>Pessoa Jur&iacute;dica</option>
            <option value="PF" {% if request.GET.tipo == 'PF' %}selected{% endif %}>Pessoa F&iacute;sica</option>
            <option value="transportadora" {% if request.GET.tipo == 'transportadora' %}selected{% endif %}>Transportadora</option>
          </select>
          <select name="status" class="form-select" style="width: 150px;">
            <option value="">Status</option>
            <option value="ativo" {% if request.GET.status == 'ativo' %}selected{% endif %}>Ativa</option>
            <option value="inativo" {% if request.GET.status == 'inativo' %}selected{% endif %}>Inativa</option>
          </select>
          <button type="button" id="btn-limpar-busca" class="btn btn-outline-secondary page-toolbar-btn">Limpar</button>
        </form>

        <div class="d-flex flex-wrap align-items-center gap-2">
          <a href="{% url 'empresas:cadastrar_empresa' %}" class="btn btn-success ajax-link">
            <i class="bi bi-plus-circle"></i> Novo
          </a>
          <button id="btn-editar-selecionado" type="button" class="btn btn-primary" disabled data-edit-url-base="{% url 'empresas:editar_empresa' 0 %}">
            <i class="bi bi-pencil"></i> Editar
          </button>
          <button id="btn-excluir-selecionados" type="button" class="btn btn-danger" disabled data-delete-url="{% url 'empresas:excluir_empresas_multiplos' %}" data-entity-label-singular="empresa" data-entity-label-plural="empresas">
            <i class="bi bi-trash"></i> Excluir
          </button>
        </div>
      </div>

      <div id="empresas-tabela-wrapper">
        {% include 'partials/empresas/_lista_empresas_table.html' %}
      </div>
    </div>
  </div>
</div>
