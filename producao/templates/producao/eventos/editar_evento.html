<div id="identificador-tela" data-tela="editar_evento">
    <div class="container-fluid pt-3 pb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-light">
                <h2 class="h4 mb-0 text-primary">{% if form.instance.pk %}Editar Evento de Manejo{% else %}Registrar Novo Evento de Manejo{% endif %}</h2>
            </div>
            <div class="card-body">
                <form method="post" class="ajax-form" action="" data-response-type="json" data-loading-message="Salvando evento...">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="{% url 'producao:lista_eventos' %}" class="btn btn-secondary ajax-link">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
