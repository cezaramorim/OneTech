{% load static %}
<div class="container-fluid pt-3 pb-4"
    id="identificador-tela"
    data-tela="lista_tanques"
    data-entidade-singular="tanque"
    data-entidade-plural="tanques"
    data-url-editar="{% url 'producao:editar_tanque' pk=0 %}"
    data-url-excluir="{% url 'producao:excluir_tanques_multiplos' %}"
    data-seletor-checkbox=".check-tanque"
    data-seletor-pai="#select-all-tanques">

    <header class="page-header d-flex flex-wrap align-items-start justify-content-between mb-4">
      <div>
        <h4 class="fw-semibold mb-2"><i class="bi bi-water me-2"></i>Lista de Tanques</h4>
        <hr class="mt-0">
      </div>
    </header>

    <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div class="page-toolbar-form d-flex align-items-center gap-2 mb-0">
            <input type="text" id="search-tanques-lista" class="form-control page-toolbar-search" placeholder="Buscar por nome, tag, unidade, linha, tipo ou situa??o..." value="{{ termo_busca }}">
            <button type="button" id="btn-limpar-tanques-lista" class="btn btn-outline-secondary page-toolbar-btn">Limpar</button>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2">
            <a href="{% url 'producao:importar_tanques' %}" class="btn btn-info ajax-link">Importar de Excel</a>
            <a href="{% url 'producao:cadastrar_tanque' %}" class="btn btn-primary ajax-link">Novo Tanque</a>
            <button id="btn-editar" class="btn btn-secondary" disabled>Editar</button>
            <button id="btn-excluir" class="btn btn-danger" disabled>Excluir</button>
        </div>
    </div>

    <div id="tanques-table-wrapper">
        {% include "producao/tanques/_lista_tanques_tabela.html" %}
    </div>
</div>
