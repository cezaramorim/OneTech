<div id="identificador-tela" data-tela="editar_tanque">
    <div class="container-fluid pt-3 pb-4">
        <div class="card shadow-sm">
            <div class="card-header bg-light">
                <h2 class="h4 mb-0 text-primary">{% if form.instance.pk %}<i class="bi bi-pencil-square me-2"></i>Editar Tanque{% else %}<i class="bi bi-plus-circle me-2"></i>Cadastrar Novo Tanque{% endif %}</h2>
            </div>
            <div class="card-body">
                <form method="post" class="form-ajax" action="">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="{% url 'producao:lista_tanques' %}" class="btn btn-secondary ajax-link">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
