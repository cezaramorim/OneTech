<div class="container-fluid pt-3 pb-4"
     data-page="lista_malhas"
     data-list-controller="unified-list"
     data-list-url="{% url 'producao:lista_malhas' %}">

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light">
            <h2 class="h4 mb-0 text-primary">Lista de Malhas</h2>
        </div>
        <div class="card-body">
            <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                <div class="page-toolbar-spacer"></div>
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <a href="{% url 'producao:cadastrar_malha' %}" class="btn btn-primary ajax-link">Nova Malha</a>
                    <button id="btn-editar-selecionado" class="btn btn-secondary" disabled data-edit-url-base="{% url 'producao:editar_malha' pk=0 %}">Editar selecionada</button>
                    <button id="btn-excluir-selecionados" class="btn btn-danger" disabled data-delete-url="{% url 'producao:excluir_malhas_multiplos' %}" data-entity-label-singular="malha" data-entity-label-plural="malhas">Excluir selecionadas</button>
                </div>
            </div>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="select-all-checkbox"></th>
                        <th>Nome</th>
                        <th>Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    {% for malha in object_list %}
                    <tr data-id="{{ malha.pk }}">
                        <td><input type="checkbox" class="row-checkbox" value="{{ malha.pk }}"></td>
                        <td>{{ malha.nome }}</td>
                        <td>
                            <a href="{% url 'producao:editar_malha' malha.pk %}" class="btn btn-sm btn-outline-primary ajax-link">Editar</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">Nenhuma malha cadastrada.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
