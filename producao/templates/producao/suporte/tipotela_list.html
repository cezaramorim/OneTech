<div id="identificador-tela"
     data-tela="lista_tipotelas"
     data-entidade-singular="tipo de tela"
     data-entidade-plural="tipos de tela"
     data-url-editar="{% url 'producao:editar_tipotela' pk=0 %}"
     data-url-excluir="{% url 'producao:excluir_tipostela_multiplos' %}"
     data-seletor-checkbox=".selecionar-tipotela"
     data-seletor-pai="#selecionar-todas-tipostela"></div>

<div class="container-fluid pt-3 pb-4">
    <header class="page-header d-flex flex-wrap align-items-start justify-content-between mb-4">
      <div>
        <h4 class="fw-semibold mb-2">Tipos de Tela</h4>
        <hr class="mt-0">
      </div>
    </header>

    <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div class="page-toolbar-spacer"></div>
        <div class="d-flex flex-wrap align-items-center gap-2">
            <a href="{% url 'producao:cadastrar_tipotela' %}" class="btn btn-primary ajax-link">Novo Tipo de Tela</a>
            <a id="btn-editar" class="btn btn-outline-primary btn-sm disabled" role="button">Editar</a>
            <button type="button" id="btn-excluir" class="btn btn-outline-danger btn-sm" disabled>Excluir</button>
        </div>
    </div>

    <div id="lista-tipostela">
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th><input type="checkbox" id="selecionar-todas-tipostela"></th>
                    <th>Nome</th>
                    <th>A&ccedil;&otilde;es</th>
                </tr>
            </thead>
            <tbody>
                {% for item in object_list %}
                <tr>
                    <td><input type="checkbox" class="selecionar-tipotela" value="{{ item.pk }}"></td>
                    <td>{{ item.nome }}</td>
                    <td>
                        <a href="{% url 'producao:editar_tipotela' item.pk %}" class="btn btn-sm btn-info ajax-link">Editar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3">Nenhum tipo de tela encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
