<div id="identificador-tela" 
     data-tela="lista_tiposevento"
     data-entidade-singular="tipo de evento"
     data-entidade-plural="tipos de evento"
     data-url-editar="{% url 'producao:editar_tipoevento' 0 %}"
     data-url-excluir="{% url 'producao:excluir_tipoevento_multiplo' %}"
     data-seletor-checkbox=".check-tipoevento"
     data-seletor-pai="#select-all-tipoevento"></div>

<div class="container-fluid mt-4">
    <h2>Tipos de Evento</h2>
    <a href="{% url 'producao:criar_tipoevento' %}" class="btn btn-primary mb-3 ajax-link">Novo Tipo de Evento</a>
    
    <!-- 🛠️ Ações principais (padrão scripts.js) -->
    <div class="d-flex flex-wrap justify-content-between gap-2 mb-3">
        <div class="d-flex flex-wrap gap-2">
            <!-- ✏️ Editar -->
            <a id="btn-editar" class="btn btn-outline-primary btn-sm disabled" role="button">
                ✏️ Editar
            </a>

            <!-- ❌ Excluir -->
            <button type="button" id="btn-excluir" class="btn btn-outline-danger btn-sm" disabled>
                🗑️ Excluir
            </button>
        </div>
    </div>

    <div id="lista-tiposevento">
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>
                        <input type="checkbox" id="select-all-tipoevento">
                    </th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for item in object_list %}
                <tr>
                    <td>
                        <input type="checkbox" class="check-tipoevento" value="{{ item.pk }}">
                    </td>
                    <td>{{ item.nome }}</td>
                    <td>
                        <a href="{% url 'producao:editar_tipoevento' item.pk %}" class="btn btn-sm btn-info ajax-link">Editar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3">Nenhum tipo de evento encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
