<div id="identificador-tela" data-tela="form_tipoevento">
    <div class="container-fluid pt-3 pb-4">
        <header class="page-header d-flex flex-wrap align-items-start justify-content-between mb-4">
          <div>
            <h4 class="fw-semibold mb-2">{% if object %}Editar Tipo de Evento{% else %}Novo Tipo de Evento{% endif %}</h4>
            <hr class="mt-0">
          </div>
        </header>
        <form method="post" class="ajax-form" data-redirect-url="{% url 'producao:lista_tiposevento' %}" data-response-type="json">
            {% csrf_token %}
            {{ form.as_p }}
            <button type-="submit" class="btn btn-success">Salvar</button>
            <a href="{% url 'producao:lista_tiposevento' %}" class="btn btn-secondary ajax-link">Cancelar</a>
        </form>
    </div>
</div>
