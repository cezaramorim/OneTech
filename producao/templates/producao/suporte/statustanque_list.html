<div id="identificador-tela"
     data-tela="lista_statustanque"
     data-entidade-singular="status de tanque"
     data-entidade-plural="status de tanques"
     data-url-editar="{% url 'producao:editar_statustanque' 0 %}"
     data-url-excluir="{% url 'producao:excluir_statustanque_multiplo' %}"
     data-seletor-checkbox=".check-statustanque"
     data-seletor-pai="#select-all-statustanque"></div>

<div class="container-fluid pt-3 pb-4">
    <header class="page-header d-flex flex-wrap align-items-start justify-content-between mb-4">
      <div>
        <h4 class="fw-semibold mb-2">Status dos Tanques</h4>
        <hr class="mt-0">
      </div>
    </header>

    <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
        <div class="page-toolbar-spacer"></div>
        <div class="d-flex flex-wrap align-items-center gap-2">
            <a href="{% url 'producao:criar_statustanque' %}" class="btn btn-primary ajax-link">Novo Status de Tanque</a>
            <a id="btn-editar" class="btn btn-outline-primary btn-sm disabled" role="button">Editar</a>
            <button type="button" id="btn-excluir" class="btn btn-outline-danger btn-sm" disabled>Excluir</button>
        </div>
    </div>

    <div id="lista-statustanque">
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th><input type="checkbox" id="select-all-statustanque"></th>
                    <th>Nome</th>
                    <th>A&ccedil;&otilde;es</th>
                </tr>
            </thead>
            <tbody>
                {% for item in object_list %}
                <tr>
                    <td><input type="checkbox" class="check-statustanque" value="{{ item.pk }}"></td>
                    <td>{{ item.nome }}</td>
                    <td>
                        <a href="{% url 'producao:editar_statustanque' item.pk %}" class="btn btn-sm btn-info ajax-link">Editar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3">Nenhum status de tanque encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
