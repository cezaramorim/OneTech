<div class="container-fluid pt-3 pb-4"
     data-page="lista_curvas"
     data-list-controller="unified-list"
     data-list-url="{% url 'producao:lista_curvas' %}">

    <div class="card shadow-sm">
        <div class="card-header bg-light">
          <h2 class="h4 mb-0 text-primary"><i class="bi bi-graph-up me-2"></i>Curvas de Crescimento</h2>
        </div>
        <div class="card-body">

            <div class="page-toolbar d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
                <div></div>
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <a href="{% url 'producao:importar_curva' %}" class="btn btn-primary ajax-link">Importar Nova Curva</a>
                    <a href="{% url 'producao:cadastrar_curva' %}" class="btn btn-secondary ajax-link">Nova Curva</a>
                    <button id="btn-editar-selecionado" class="btn btn-info" disabled data-edit-url-base="{% url 'producao:editar_curva' pk=0 %}">Editar selecionado</button>
                    <button id="btn-excluir-selecionados" class="btn btn-danger" disabled data-delete-url="{% url 'producao:excluir_curvas_multiplas' %}" data-entity-label-singular="curva de crescimento" data-entity-label-plural="curvas de crescimento">Excluir selecionados</button>
                </div>
            </div>

            {% if curvas %}
            <div class="table-responsive">
                <table class="table table-hover table-striped">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="select-all-checkbox"></th>
                            <th>Nome da Curva</th>
                            <th>Especie</th>
                            <th>% Rendimento</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for curva in curvas %}
                        <tr data-id="{{ curva.pk }}">
                            <td><input type="checkbox" class="row-checkbox" value="{{ curva.pk }}"></td>
                            <td><a href="{% url 'producao:detalhe_curva' pk=curva.pk %}" class="ajax-link">{{ curva.nome }}</a></td>
                            <td>{{ curva.especie }}</td>
                            <td>{{ curva.rendimento_perc }}%</td>
                            <td>
                                <a href="{% url 'producao:detalhe_curva' pk=curva.pk %}" class="btn btn-sm btn-info ajax-link" title="Ver Detalhes">
                                    <i class="fas fa-eye"></i>
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% else %}
            <div class="alert alert-info text-center mb-0" role="alert">
                Nenhuma curva de crescimento encontrada. <a href="{% url 'producao:importar_curva' %}" class="alert-link ajax-link">Importe uma agora!</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
