name: E2E Nota Fiscal

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  e2e-nota-fiscal:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: '@HH124513HH'
          MYSQL_DATABASE: onetech
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p@HH124513HH"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare environment file
        run: |
          cat > config/.env << 'EOF'
          SECRET_KEY=ci-secret-key
          DEBUG=False
          ALLOWED_HOSTS=127.0.0.1,localhost,testserver,tenant-e2e.localhost
          USE_HTTPS=True
          SECURE_SSL_REDIRECT=True
          SECURE_HSTS_SECONDS=31536000
          SECURE_HSTS_INCLUDE_SUBDOMAINS=True
          SECURE_HSTS_PRELOAD=True
          SESSION_COOKIE_SECURE=True
          CSRF_COOKIE_SECURE=True
          EOF

      - name: Wait for MySQL
        run: |
          for i in {1..20}; do
            mysqladmin ping -h 127.0.0.1 -uroot -p@HH124513HH && break
            echo "Waiting for MySQL..."
            sleep 3
          done

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run E2E NF tests
        run: |
          mkdir -p artifacts
          python manage.py test nota_fiscal.tests.NotaFiscalFluxoE2ETests 2>&1 | tee artifacts/e2e_nota_fiscal.log

      - name: Upload E2E evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-nota-fiscal-evidence
          path: artifacts/e2e_nota_fiscal.log
